services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: my_admin
    ports:
      - "3300:80"
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    volumes:
      - ./storage:/rails/storage
    restart: unless-stopped
